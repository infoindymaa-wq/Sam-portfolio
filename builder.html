<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAM | Cloud Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-body: #05050f; --bg-side: #0a0a1a; --accent: #7042f8; --accent-glow: rgba(112, 66, 248, 0.3); --card-bg: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); --text-main: #ffffff; --text-dim: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        aside { width: 260px; background: var(--bg-side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px 20px; }
        .admin-brand { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .nav-menu { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        .nav-item { padding: 12px 15px; border-radius: 10px; color: var(--text-dim); text-decoration: none; display: flex; align-items: center; gap: 12px; transition: 0.3s; cursor: pointer; font-size: 14px; font-weight: 500; }
        .nav-item:hover, .nav-item.active { background: var(--accent-glow); color: var(--accent); }
        main { flex-grow: 1; overflow-y: auto; padding: 40px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.4s ease; }
        .form-card { background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: 20px; max-width: 800px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }
        input, textarea { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; color: white; outline: none; transition: 0.3s; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .project-compact-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .project-compact-card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 15px; display: flex; flex-direction: column; gap: 10px; }
        .project-compact-card h4 { margin: 0; font-size: 16px; }
        #modal-overlay, #skill-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .modal { background: #16162d; border: 1px solid var(--border); border-radius: 20px; padding: 30px; width: 500px; max-width: 90%; }
        .skill-tag { background: var(--accent); padding: 5px 12px; border-radius: 20px; font-size: 12px; display: inline-flex; align-items: center; gap: 8px; margin: 5px; }
        #toast { position: fixed; bottom: 30px; right: 30px; padding: 15px 30px; border-radius: 12px; background: var(--accent); color: white; display: none; z-index: 4000; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <aside>
        <div class="admin-brand"><i data-lucide="cloud"></i> SAM CLOUD</div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="showView('v-content', this)"><i data-lucide="edit-3"></i> Identity</div>
            <div class="nav-item" onclick="showView('v-projects', this)"><i data-lucide="folder-kanban"></i> Projects</div>
        </div>
        <div class="nav-item" onclick="window.open('index.html', '_blank')"><i data-lucide="external-link"></i> View Site</div>
    </aside>

    <main>
        <header><h2>Admin Dashboard</h2><div id="status">Supabase Connected</div></header>

        <!-- IDENTITY VIEW -->
        <div id="v-content" class="view-section active">
            <div class="form-card">
                <h3>Identity & Branding</h3>
                <div class="form-group"><label>Logo Text</label><input type="text" id="f-logo"></div>
                <div class="form-group"><label>Hero Tag</label><input type="text" id="f-tag"></div>
                <div class="form-group"><label>Main Title</label><input type="text" id="f-title"></div>
                <div class="form-group"><label>Hero Image URL</label><input type="text" id="f-hero-img"></div>
                <div class="form-group"><label>Bio</label><textarea id="f-desc" rows="4"></textarea></div>
                <button class="btn-primary" onclick="saveToCloud()"><i data-lucide="save"></i> Save Changes</button>
            </div>
        </div>

        <!-- PROJECTS VIEW -->
        <div id="v-projects" class="view-section">
            <div class="project-compact-grid" id="project-list"></div>
            <button class="btn-primary" style="margin-top:20px" onclick="openProjectModal()"><i data-lucide="plus"></i> Add New Project</button>
            <button class="btn-primary" style="margin-top:20px; width:100%; justify-content:center" onclick="saveToCloud()">Apply Projects to Cloud</button>
        </div>
    </main>

    <!-- PROJECT MODAL -->
    <div id="modal-overlay">
        <div class="modal">
            <h3>Add/Edit Project</h3>
            <div class="form-group"><label>Title</label><input type="text" id="p-title"></div>
            <div class="form-group"><label>Image URL</label><input type="text" id="p-img"></div>
            <div class="form-group"><label>Website Link</label><input type="text" id="p-url"></div>
            <div class="form-group"><label>Tag (e.g. Web)</label><input type="text" id="p-tag"></div>
            <div class="form-group"><label>Description</label><textarea id="p-desc" rows="2"></textarea></div>
            <div style="display:flex; gap:10px;">
                <button class="btn-primary" style="flex:1" onclick="saveProjectModal()">Done</button>
                <button class="btn-primary" style="flex:1; background:#333;" onclick="document.getElementById('modal-overlay').style.display='none'">Cancel</button>
            </div>
        </div>
    </div>

    <div id="toast">Saved!</div>

    <script type="module">
        const SUPABASE_URL = 'https://svsusxfshnxjozbdtchz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_3A7j6KHCcwOz-EG2Slm6QA_MPJBiHPv';
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentData = { projects: [], skills: [] };

        async function loadData() {
            const { data } = await _supabase.from('portfolio').select('content').eq('id', 1).single();
            if (data) {
                currentData = data.content;
                if(!currentData.projects) currentData.projects = [];
                // Fixed skills will always be merged or preserved
                const fixedSkills = [
                    { "name": "HTML", "icon": "html5" }, { "name": "CSS", "icon": "css3" }, { "name": "JS", "icon": "javascript" }, 
                    { "name": "React", "icon": "react" }, { "name": "NextJS", "icon": "nextjs" }, { "name": "Node", "icon": "nodejs" },
                    { "name": "TS", "icon": "typescript" }, { "name": "Tailwind", "icon": "tailwindcss" }, { "name": "Python", "icon": "python" },
                    { "name": "Java", "icon": "java" }, { "name": "MongoDB", "icon": "mongodb" }, { "name": "Docker", "icon": "docker" },
                    { "name": "C++", "icon": "cplusplus" }, { "name": "Git", "icon": "git" }, { "name": "Redux", "icon": "redux" },
                    { "name": "Vue", "icon": "vuejs" }, { "name": "MySQL", "icon": "mysql" }, { "name": "Figma", "icon": "figma" }
                ];
                currentData.skills = fixedSkills;

                document.getElementById('f-logo').value = currentData.logo || "";
                document.getElementById('f-tag').value = currentData.heroTag || "";
                document.getElementById('f-title').value = currentData.heroTitle || "";
                document.getElementById('f-hero-img').value = currentData.heroImg || "";
                document.getElementById('f-desc').value = currentData.heroDesc || "";
                
                renderProjects();
            }
        }

        window.saveToCloud = async function() {
            currentData.logo = document.getElementById('f-logo').value;
            currentData.heroTag = document.getElementById('f-tag').value;
            currentData.heroTitle = document.getElementById('f-title').value;
            currentData.heroImg = document.getElementById('f-hero-img').value;
            currentData.heroDesc = document.getElementById('f-desc').value;
            
            // Skills are always preserved from the fixed list
            const { error } = await _supabase.from('portfolio').update({ content: currentData }).eq('id', 1);
            if(!error) showToast("Cloud Updated!");
        }

        function renderProjects() {
            document.getElementById('project-list').innerHTML = (currentData.projects || []).map((p, i) => `
                <div class="project-compact-card">
                    <h4>${p.title}</h4>
                    <button class="btn-sm" style="background:#ef4444; color:white; border:none; padding:5px; border-radius:5px; cursor:pointer;" onclick="removeProject(${i})">Delete</button>
                </div>
            `).join('');
        }
        window.removeProject = (i) => { currentData.projects.splice(i, 1); renderProjects(); };
        window.openProjectModal = () => { document.getElementById('modal-overlay').style.display='flex'; };
        window.saveProjectModal = () => {
            currentData.projects.push({
                title: document.getElementById('p-title').value,
                img: document.getElementById('p-img').value,
                url: document.getElementById('p-url').value,
                tag: document.getElementById('p-tag').value,
                desc: document.getElementById('p-desc').value
            });
            document.getElementById('modal-overlay').style.display='none';
            renderProjects();
        };

        window.showView = (id, el) => {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        };

        function showToast(m) { const t = document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }

        window.onload = () => { 
            const pass = prompt("Enter Admin Password:");
            if (pass !== "indymaa777") {
                alert("Access Denied!");
                document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:100px;'>403 - Forbidden</h1>";
                return;
            }
            loadData(); 
            lucide.createIcons(); 
        };
    </script>
    </script>
</body>
</html>
